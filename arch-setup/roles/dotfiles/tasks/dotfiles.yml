---

- name: Get the actual user (even with sudo)
  ansible.builtin.shell: echo "${SUDO_USER:-$USER}"
  register: actual_user
  changed_when: false
  become: false

- name: Set user facts correctly
  ansible.builtin.set_fact:
    real_user: "{{ actual_user.stdout }}"
    user_home: "/home/{{ actual_user.stdout }}"
    dotfiles_path: "{{ dotfiles_path | default(user_home ~ '/.dotfiles') }}"
  become: false

- name: Ensure required directories exist
  ansible.builtin.file:
    path: "{{ user_home }}/{{ item.dest | dirname }}"
    state: directory
    mode: '0755'
    owner: "{{ real_user }}"
    group: "{{ real_user }}"
  become: true
  loop: "{{ dotfiles_symlinks }}"
  when: "item.dest is defined and '/' in item.dest"

- name: Create symlinks for dotfiles
  ansible.builtin.file:
    src: "{{ dotfiles_path }}/{{ item.src }}"
    dest: "{{ user_home }}/{{ item.dest }}"
    state: link
    force: "{{ dotfiles_force_symlinks | default(false) }}"
    owner: "{{ real_user }}"
    group: "{{ real_user }}"
  loop: "{{ dotfiles_symlinks }}"
  become: true
  when: dotfiles_symlinks is defined
